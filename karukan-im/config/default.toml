# Karukan IME デフォルト設定
# このファイルは ~/.config/karukan-im/config.toml にコピーして使用してください

[conversion]
# 変換ストラテジー: adaptive（動的切替）, light（軽量モデルのみ）, main（メインモデルのみ）
strategy = "adaptive"
# 変換候補数（Space押下時）
num_candidates = 9
# 周辺テキスト（カーソル左側の確定済みテキスト）を変換時のコンテキストとして使用する
use_context = true
# 変換API に渡す周辺テキストの最大文字数
max_context_length = 10
# ライブ変換で1回のGPT2変換が扱う読みの最大文字数。
# 入力をこの長さごとのチャンクに内部分割し、各チャンクを個別に変換することで
# 長文入力でも1キーあたりの変換レイテンシを一定以内に抑える。
# 各チャンクの左コンテキストは直前までのチャンクの変換結果になる。
composing_chunk_len = 30
# ビームサーチを使うトークン数の上限（それ以上はgreedy）
short_input_threshold = 10
# 短い入力のビーム幅
beam_width = 3
# メインモデルの推論がこの時間(ms)を超えたらlight_modelに自動切替(0で無効)
max_latency_ms = 100
# Model variant id or GGUF path (uses registry default if unset)
model = "jinen-v1-small-q5"
# Beam search model for Space conversion (uses default model only if unset)
light_model = "jinen-v1-xsmall-q5"
# 推論スレッド数（0 = 全コア使用）
n_threads = 4
# 起動時にライブ変換を有効にする（Ctrl+Shift+L で実行中も切替可能）
live_conversion = true
# ユーザー辞書: ~/.local/share/karukan-im/user_dicts/ に辞書ファイルを配置（Mozc TSV or KRKN binary）

[learning]
# 変換学習を有効にする
enabled = true
# 学習エントリの最大数
max_entries = 10000

[dictionary_update]
# 公開済みの最新システム辞書をバックグラウンドで確認する
enabled = true
# 更新確認の最短間隔（時間）。0にすると起動のたびに確認する
check_interval_hours = 24
# Karukanが公開する、バージョンとSHA-256を含む更新情報
manifest_url = "https://raw.githubusercontent.com/togatoga/karukan/main/dictionary/manifest.json"
# 接続・読み込みごとのタイムアウト（秒）
timeout_seconds = 30
